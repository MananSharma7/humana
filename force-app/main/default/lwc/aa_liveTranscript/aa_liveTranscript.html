<template>
	<div class="transcript-panel">
		<div class="search-bar">
			<div class="search-input-wrap">
				<lightning-icon
					icon-name="utility:search"
					size="xx-small"
					alternative-text="Search"
					class="search-icon"
				></lightning-icon>
				<input
					type="text"
					class="search-input"
					placeholder="Search transcript..."
					value={searchTerm}
					oninput={handleSearchInput}
					aria-label="Search transcript"
				/>
				<template lwc:if={searchTerm}>
					<span class="match-counter">{matchLabel}</span>
					<button
						class="search-nav-btn"
						onclick={handlePrev}
						title="Previous match"
						aria-label="Previous match"
					>
						&#8249;
					</button>
					<button class="search-nav-btn" onclick={handleNext} title="Next match" aria-label="Next match">
						&#8250;
					</button>
					<button
						class="search-clear-btn"
						onclick={clearSearch}
						title="Clear search"
						aria-label="Clear search"
					>
						&#10005;
					</button>
				</template>
			</div>
		</div>

		<template lwc:if={hasError}>
			<div class="error-banner">
				<lightning-icon
					icon-name="utility:error"
					size="x-small"
					alternative-text="Error"
					class="error-icon"
				></lightning-icon>
				<span class="error-message">{errorMessage}</span>
				<button class="dismiss-btn" onclick={dismissError} aria-label="Dismiss error">&#10005;</button>
			</div>
		</template>

		<div class="transcript-body" data-id="transcript-body" lwc:ref="transcriptBody">
			<template for:each={transcriptMessages} for:item="msg">
				<div key={msg.id} class={msg.wrapClass}>
					<div class="lt-meta">
						<span class={msg.roleClass}>{msg.roleLabel}</span>
						<span class="lt-time">{msg.timeLabel}</span>
					</div>
					<div class={msg.bubbleClass}>
						<span class="lt-msg-text">
							<template for:each={msg.contentSegments} for:item="seg">
								<template if:true={seg.isMatch}>
									<mark key={seg.id} class={seg.markClass} data-match={seg.matchId}>{seg.text}</mark>
								</template>
								<template if:false={seg.isMatch}> {seg.text} </template>
							</template>
						</span>
					</div>
				</div>
			</template>
		</div>
		<div class="transcript-footer">
			<template lwc:if={isLive}>
				<span class="footer-live-indicator">
					<span class="live-dot-sm"></span>
					Transcribing...
				</span>
			</template>
			<template lwc:else>
				<span class="footer-ended">
					<lightning-icon
						icon-name="utility:end_call"
						alternative-text="end_call"
						size="x-small"
						title="end_call"
						class="footer-ended-icon"
					></lightning-icon>
					Call ended
				</span>
			</template>
		</div>
	</div>
</template>
