<template>
	<template lwc:if={isIntContextError}>
		<div class="knowledge-error">
			<span
				><lightning-icon
					icon-name="utility:error"
					alternative-text="error"
					size="x-small"
					title="error"
					class="custom-icon-error"
				></lightning-icon>
			</span>
			<span style="margin-left: 5px">{intContErrorMessage}</span>
		</div>
	</template>
	<template lwc:if={isCustContextError}>
		<div class="knowledge-error">
			<span
				><lightning-icon
					icon-name="utility:error"
					alternative-text="error"
					size="x-small"
					title="error"
					class="custom-icon-error"
				></lightning-icon>
			</span>
			<span style="margin-left: 5px">{custContErrorMessage}</span>
		</div>
	</template>
	<template lwc:if={error}>
		<div class="knowledge-error">
			<span
				><lightning-icon
					icon-name="utility:error"
					alternative-text="error"
					size="x-small"
					title="error"
					class="custom-icon-error"
				></lightning-icon>
			</span>
			<span style="margin-left: 5px">{errorMessage}</span>
		</div>
	</template>
	<template lwc:else>
		<template if:true={showComponent}>
			<template if:true={isLoading}>
				<p class="slds-p-around_xx-small">Loading Agent Assist...</p>
			</template>
			<template if:false={isLoading}>
				<div class="outer-container">
					<!-- Main Panels -->
					<div class="main-panels">
						<c-aa_knowledge-agent-assist record-id={recordId}></c-aa_knowledge-agent-assist>
						<c-aa_interaction360 record-id={recordId} onexpand={handleExpand}></c-aa_interaction360>
					</div>
				</div>
			</template>
		</template>
		<template if:false={showComponent}>
			<!-- Display access denied message -->
			<div class="permissioncontainer">
				<p class="permissionaccess">
					You do not have permission to view Agent Assist,<br />
					please contact your Admin.
				</p>
			</div>
			<div if:true={showSSOMessage} class="slds-notify slds-notify_alert slds-alert_info" role="alert">
				<lightning-icon variant="inverse" icon-name="utility:info" size="x-medium"></lightning-icon>
				<h2>{ssoMessage}</h2>
			</div>
		</template>
	</template>
</template>
